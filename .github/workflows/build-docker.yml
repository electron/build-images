name: Build Docker images

on:
  pull_request:

jobs:
  build-x64:
    if: github.repository == 'electron/build-images'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/pipeline-docker-build.yml
    with:
      docker-name: build
      dockerfile: Dockerfile
      publish: false
  build-arm64v8-test:
    if: github.repository == 'electron/build-images'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/pipeline-docker-build.yml
    with:
      docker-name: test
      dockerfile: Dockerfile.tests.arm
      tag-prefix: arm64v8-
      platform: linux/arm64
      publish: false
  build-arm32v7-test:
    if: github.repository == 'electron/build-images'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/pipeline-docker-build.yml
    with:
      docker-name: test
      dockerfile: Dockerfile.tests.arm
      tag-prefix: arm32v7-
      platform: linux/arm
      publish: false
  build-devcontainer:
    if: github.repository == 'electron/build-images'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/pipeline-docker-build.yml
    with:
      docker-name: devcontainer
      dockerfile: Dockerfile.devcontainer
      publish: false
