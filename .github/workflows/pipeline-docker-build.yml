name: Build and optionally Publish Docker Images

on:
  workflow_call:
    inputs:
      docker-name:
        description: 'Name of folder in the "docker" directory in this repository'
        required: true
        type: string
      dockerfile:
        description: 'Name of the docker file to use'
        required: true
        type: string
      tag-prefix:
        type: string
        default: ''
      platform:
        description: 'Docker build platform'
        type: string        
        default: linux/amd64
      publish:
        description: 'Whether to publish the image as well'
        required: true
        type: boolean
      runs-on:
        description: 'Host OS'
        default: ubuntu-latest
        type: string

concurrency:
  group: build-docker-${{ inputs.docker-name }}-${{ inputs.tag-prefix }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-image:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # Keep this in sync with NODE_MAJOR in tools/install-deps.sh so the
          # cached headers match the Node version installed in the images.
          node-version: '22'
      - name: Pre-populate node-gyp header cache
        # Headers are platform/arch-independent (only Windows pulls an
        # arch-specific node.lib), so it is safe to generate them on the amd64
        # runner and COPY the result into every image.
        run: |
          corepack enable
          yarn install --immutable
          yarn node-gyp install --devdir "$PWD/.node-gyp-headers"
          ls -la .node-gyp-headers
      - name: Build and push Docker image
        id: push
        uses: mr-smithers-excellent/docker-build-push@19d2beefef6bcdc202195fdcb9deb79a4fab5c1f # v6.8
        with:        
          dockerfile: ${{ inputs.dockerfile }}
          image: ${{ inputs.docker-name }}
          tags: ${{ inputs.tag-prefix }}latest, ${{ inputs.tag-prefix }}${{ github.sha }}
          platform: ${{ inputs.platform }}
          registry: ghcr.io
          pushImage: ${{ inputs.publish }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
